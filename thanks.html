<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>You're on the list. CalGrind</title>
<meta name="description" content="You're on the CalGrind waitlist. We'll email you the moment CalGrind is ready.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#9AD4F0">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Inter:wght@400;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Inter:wght@400;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Inter:wght@400;600&display=swap"></noscript>
<noscript><style>.reveal>*{opacity:1}</style></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overscroll-behavior:none}
body{color:#3E2C1E;font:400 17px/1.6 Inter,system-ui,sans-serif;min-height:100svh;display:grid;place-items:center;padding:24px;text-align:center;background:#9AD4F0}
h1{font:700 clamp(28px,5.5vw,40px)/1.15 "Baloo 2",sans-serif;margin:0 0 12px}
p{margin:0}
.stage{position:relative;width:min(200px,50vw);margin:0 auto}
.stage picture{display:contents}
.stage img{width:100%;height:auto;display:block}
.card{background:#FFFDF6;border-radius:26px;padding:34px 30px;box-shadow:0 14px 30px rgba(62,44,30,.14),0 4px 10px rgba(62,44,30,.07);max-width:440px;margin:26px auto 0;text-align:left}
.shadow{position:absolute;left:50%;bottom:-4px;width:66%;height:16px;translate:-50% 0;background:radial-gradient(50% 50%,rgba(62,44,30,.32),transparent 72%)}
a{display:inline-block;margin-top:26px;font:700 18px "Baloo 2",sans-serif;color:#3E2C1E;background:#FF6A3D;border-radius:16px;padding:14px 28px;text-decoration:none;transition:transform .15s ease-out,box-shadow .15s ease-out}
a:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(216,74,20,.32)}
a:active{transform:translateY(0) scale(.99);box-shadow:0 2px 6px rgba(216,74,20,.26)}
:focus-visible{outline:3px solid #3E2C1E;outline-offset:3px}
.reveal>*{opacity:0}
.reveal>*.in{animation:riseIn .55s ease-out both}
.reveal>*.in:nth-child(2){animation-delay:.12s}
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){a{transition:none}.reveal>*{opacity:1;animation:none}}
</style>
</head>
<body>
<main class="reveal">
  <div class="stage">
    <picture><source type="image/webp" srcset="zuri-welcome.webp 1x, zuri-welcome@2x.webp 2x"><img src="zuri-welcome.png" srcset="zuri-welcome.png 1x, zuri-welcome@2x.png 2x" width="320" height="512" alt="Zuri, a small cartoon giraffe with brown spots, waving hello."></picture>
    <div class="shadow" aria-hidden="true"></div>
  </div>
  <div class="card">
    <h1>You're on the list!</h1>
    <p>Zuri is holding your spot with both hooves. You will be first to hear the moment CalGrind is ready, so there is nothing else you need to do.</p>
    <a href="/">Back to the savanna</a>
  </div>
</main>
<script>
(function(){
  var reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var els=document.querySelectorAll(".reveal>*");
  if(reduced||!("IntersectionObserver" in window)){els.forEach(function(e){e.classList.add("in")});return;}
  var io=new IntersectionObserver(function(entries){entries.forEach(function(en){if(en.isIntersecting){en.target.classList.add("in");io.unobserve(en.target);}});},{threshold:.12});
  els.forEach(function(e){io.observe(e)});
})();
</script>
</body>
</html>
